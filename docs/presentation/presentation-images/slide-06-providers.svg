<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Constellation diagram -->
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- Central hub -->
  <circle cx="200" cy="200" r="40" stroke="#67e8f9" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="15" fill="#67e8f9" opacity="0.3"/>
  <text x="200" y="206" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#67e8f9" opacity="0.8">&gt;_</text>

  <!-- Provider nodes -->
  <!-- Node 1 (top) -->
  <circle cx="200" cy="60" r="28" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="60" r="10" fill="#a78bfa" opacity="0.3"/>
  <line x1="200" y1="88" x2="200" y2="160" stroke="#a78bfa" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Node 2 (top-right) -->
  <circle cx="320" cy="120" r="24" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
  <circle cx="320" cy="120" r="8" fill="#4ade80" opacity="0.3"/>
  <line x1="298" y1="136" x2="232" y2="184" stroke="#4ade80" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Node 3 (right) -->
  <circle cx="340" cy="240" r="22" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <circle cx="340" cy="240" r="8" fill="#fbbf24" opacity="0.3"/>
  <line x1="318" y1="232" x2="240" y2="208" stroke="#fbbf24" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Node 4 (bottom-right) -->
  <circle cx="290" cy="330" r="24" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <circle cx="290" cy="330" r="8" fill="#60a5fa" opacity="0.3"/>
  <line x1="272" y1="314" x2="220" y2="230" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Node 5 (bottom-left) -->
  <circle cx="110" cy="330" r="24" stroke="#f0abfc" stroke-width="1.5" opacity="0.5"/>
  <circle cx="110" cy="330" r="8" fill="#f0abfc" opacity="0.3"/>
  <line x1="128" y1="314" x2="180" y2="230" stroke="#f0abfc" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Custom (left) -->
  <circle cx="60" cy="240" r="22" stroke="#67e8f9" stroke-width="1.5" opacity="0.4"/>
  <circle cx="60" cy="240" r="8" fill="#67e8f9" opacity="0.2"/>
  <line x1="82" y1="232" x2="160" y2="208" stroke="#67e8f9" stroke-width="1" opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Top-left -->
  <circle cx="80" cy="120" r="24" stroke="#f87171" stroke-width="1.5" opacity="0.5"/>
  <circle cx="80" cy="120" r="8" fill="#f87171" opacity="0.3"/>
  <line x1="102" y1="136" x2="168" y2="184" stroke="#f87171" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Animated pulse rings -->
  <circle cx="200" cy="200" r="55" stroke="#67e8f9" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="55;70;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="80" stroke="#a78bfa" stroke-width="0.5" opacity="0.08">
    <animate attributeName="r" values="80;95;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.03;0.08" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
