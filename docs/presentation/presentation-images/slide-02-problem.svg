<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Fragmented terminal illustration -->
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- Broken terminal window -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="280" height="200" rx="12" stroke="#67e8f9" stroke-width="1.5" opacity="0.4"/>
    <rect x="0" y="0" width="280" height="30" rx="12" fill="#141419" opacity="0.8"/>
    <circle cx="20" cy="15" r="5" fill="#f87171" opacity="0.6"/>
    <circle cx="38" cy="15" r="5" fill="#fbbf24" opacity="0.6"/>
    <circle cx="56" cy="15" r="5" fill="#4ade80" opacity="0.6"/>

    <!-- Fragmented code lines -->
    <line x1="20" y1="50" x2="120" y2="50" stroke="#67e8f9" stroke-width="2" opacity="0.3"/>
    <line x1="20" y1="70" x2="180" y2="70" stroke="#a78bfa" stroke-width="2" opacity="0.25"/>
    <line x1="20" y1="90" x2="140" y2="90" stroke="#67e8f9" stroke-width="2" opacity="0.2"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#a78bfa" stroke-width="2" opacity="0.15"/>

    <!-- Crack lines -->
    <path d="M140 0 L160 80 L130 120 L170 200" stroke="#f87171" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
    <path d="M200 30 L180 100 L210 160" stroke="#f87171" stroke-width="1" opacity="0.3" stroke-dasharray="3 4"/>
  </g>

  <!-- Scattered fragments -->
  <g transform="translate(180, 260) rotate(-15)">
    <rect width="100" height="60" rx="6" stroke="#67e8f9" stroke-width="1" opacity="0.2"/>
    <line x1="10" y1="15" x2="60" y2="15" stroke="#a78bfa" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="30" x2="80" y2="30" stroke="#67e8f9" stroke-width="1.5" opacity="0.1"/>
  </g>

  <g transform="translate(70, 280) rotate(10)">
    <rect width="80" height="50" rx="6" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <line x1="10" y1="15" x2="50" y2="15" stroke="#67e8f9" stroke-width="1.5" opacity="0.15"/>
    <line x1="10" y1="30" x2="65" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.1"/>
  </g>

  <!-- Question marks / confusion -->
  <text x="320" y="120" font-family="JetBrains Mono, monospace" font-size="32" fill="#f87171" opacity="0.3">?</text>
  <text x="50" y="360" font-family="JetBrains Mono, monospace" font-size="24" fill="#fbbf24" opacity="0.2">!</text>
</svg>
