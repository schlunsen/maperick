<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Presenter — Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="engine/presentation-styles.css" />
  <style>
    /* Override presentation defaults for editor layout */
    html, body { overflow: hidden; height: 100%; }
    body { display: flex; }

    /* Editor layout: preview left, panel right */
    .editor-layout {
      display: grid; grid-template-columns: 1fr 380px; width: 100%; height: 100vh;
    }

    /* Left: slide preview */
    .preview-pane {
      position: relative; overflow: hidden; background: var(--bg);
    }
    .preview-pane .slide {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 3rem;
      opacity: 1; transform: none; pointer-events: all;
    }
    .preview-toolbar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem; background: rgba(26,21,32,0.9); backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
    }
    .preview-toolbar .slide-thumbs {
      display: flex; gap: 0.4rem; overflow-x: auto; flex: 1; padding-right: 1rem;
    }
    .slide-thumb {
      width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--bg-card); color: var(--text-dim); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0; font-family: var(--font-mono);
    }
    .slide-thumb:hover { border-color: var(--rose); color: var(--rose); }
    .slide-thumb.active { border-color: var(--rose); background: rgba(240,166,202,0.15); color: var(--rose); }
    .preview-actions { display: flex; gap: 0.5rem; }

    /* Right: editor panel */
    .editor-panel {
      display: flex; flex-direction: column; background: var(--bg-surface);
      border-left: 1px solid var(--border); height: 100vh;
    }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      background: rgba(26,21,32,0.5);
    }
    .panel-header h2 { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .panel-counter { font-size: 0.75rem; color: var(--text-dim); font-family: var(--font-mono); }

    /* Tabs */
    .panel-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .panel-tab {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.78rem; font-weight: 600;
      color: var(--text-dim); cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent; transition: all 0.2s; font-family: var(--font);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .panel-tab:hover { color: var(--text); }
    .panel-tab.active { color: var(--rose); border-bottom-color: var(--rose); }

    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* Chat tab */
    .chat-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .chat-placeholder {
      color: var(--text-faint); font-size: 0.85rem; line-height: 1.8; padding: 2rem 1rem; text-align: center;
    }
    .chat-msg { padding: 0.6rem 0.8rem; border-radius: 10px; font-size: 0.85rem; line-height: 1.5; }
    .chat-user { background: rgba(240,166,202,0.1); border: 1px solid rgba(240,166,202,0.15); align-self: flex-end; max-width: 85%; }
    .chat-assistant { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; max-width: 85%; }
    .chat-role { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); display: block; margin-bottom: 0.25rem; }
    .chat-content { color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
    .chat-content.streaming { color: var(--lavender); }

    .chat-input-row {
      display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border);
      background: rgba(26,21,32,0.5);
    }
    .chat-input-row textarea {
      flex: 1; padding: 0.6rem 0.8rem; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 0.85rem;
      resize: none; outline: none; min-height: 40px; max-height: 120px; line-height: 1.4;
    }
    .chat-input-row textarea:focus { border-color: var(--rose); }
    .chat-send {
      width: 40px; height: 40px; border-radius: 10px; border: none;
      background: var(--rose-dark); color: white; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .chat-send:hover { background: var(--rose); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* HTML tab */
    .html-editor-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .html-editor {
      flex: 1; padding: 1rem; background: rgba(0,0,0,0.3); border: none; color: var(--text);
      font-family: var(--font-mono); font-size: 0.75rem; line-height: 1.6; resize: none; outline: none;
      white-space: pre; overflow: auto; tab-size: 2;
    }
    .html-actions {
      display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border);
    }

    /* Action buttons */
    .btn {
      padding: 0.45rem 0.85rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-muted); font-family: var(--font);
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .btn:hover { border-color: var(--rose); color: var(--rose); }
    .btn.primary { background: var(--rose-dark); border-color: var(--rose); color: white; }
    .btn.primary:hover { background: var(--rose); }
    .btn.danger:hover { border-color: var(--coral); color: var(--coral); }

    /* Responsive */
    @media (max-width: 768px) {
      .editor-layout { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; }
      .editor-panel { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="editor-layout" id="editor-app">
    <!-- Left: Live Preview -->
    <div class="preview-pane">
      <div id="slide-preview"></div>
      <div class="preview-toolbar">
        <div class="slide-thumbs" id="slide-nav"></div>
        <div class="preview-actions">
          <button class="btn" id="add-slide-btn" title="Add slide">+ Add</button>
          <button class="btn danger" id="delete-slide-btn" title="Delete slide">Delete</button>
          <button class="btn" id="undo-btn" title="Undo (Ctrl+Z)">Undo</button>
          <button class="btn primary" id="export-btn">Export</button>
        </div>
      </div>
    </div>

    <!-- Right: Editor Panel -->
    <div class="editor-panel">
      <div class="panel-header">
        <h2>Slide Editor</h2>
        <span class="panel-counter" id="ed-slide-counter">Slide 1 / 1</span>
      </div>

      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="chat">AI Chat</button>
        <button class="panel-tab" data-tab="html">HTML</button>
      </div>

      <!-- Chat Tab -->
      <div class="tab-content active" id="tab-chat" data-tab="chat">
        <div class="chat-container">
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-row">
            <textarea id="chat-input" placeholder="Ask AI to modify this slide..." rows="1"></textarea>
            <button class="chat-send" id="chat-send">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- HTML Tab -->
      <div class="tab-content" id="tab-html" data-tab="html">
        <div class="html-editor-container">
          <textarea class="html-editor" id="html-editor" spellcheck="false"></textarea>
          <div class="html-actions">
            <button class="btn primary" id="apply-html">Apply Changes</button>
            <button class="btn" id="present-btn">Present</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.panel-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.tab-content[data-tab="${tab.dataset.tab}"]`).classList.add('active');
      });
    });
  </script>
  <script src="studio/llm-client.js"></script>
  <script src="studio/slide-templates.js"></script>
  <script src="studio/editor.js"></script>
</body>
</html>
